name: Auto-Build Dokkan Hub
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**' # Don't trigger if we just edit the workflow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build Hub and Push to Target
        env:
          HUB_TOKEN: ${{ secrets.HUB_TOKEN }}
        run: |
          cat << 'EOF' > build.js
          const fs = require('fs');
          const path = require('path');

          const sourceUrl = "https://abscustom.github.io";
          const targetRepo = "abscustom/DokkanCustom";
          const token = process.env.HUB_TOKEN;

          console.log("Scanning repository for characters...");
          
          const folders = fs.readdirSync('.', { withFileTypes: true })
            .filter(d => d.isDirectory() && !d.name.startsWith('.'))
            .map(d => d.name);

          let characters = [];

          folders.forEach(folder => {
            const indexPath = path.join(folder, 'index.html');
            if (!fs.existsSync(indexPath)) return;
            const html = fs.readFileSync(indexPath, 'utf8');

            const titleMatch = html.match(/<title>([^<]+)<\/title>/i);
            let title = titleMatch ? titleMatch[1].replace(/^\[.*?\]\s*/, '').trim() : folder;

            // Extract the Hub ID tag, default to 'a' if it doesn't exist
            const tagMatch = html.match(/<meta\s+name="hub-id"\s+content="([^"]*)"/i);
            let cardTag = tagMatch ? tagMatch[1].toLowerCase().trim() : "a";
            if (cardTag === "") cardTag = "a";

            const lrMatch = html.match(/id="img-lr"[^>]*src="([^"]+)"/i);
            const turMatch = html.match(/id="img-tur"[^>]*src="([^"]+)"/i);
            const ssrMatch = html.match(/id="img-ssr"[^>]*src="([^"]+)"/i);
            
            let charImgRaw = '';
            if (lrMatch) charImgRaw = lrMatch[1];
            else if (turMatch) charImgRaw = turMatch[1];
            else if (ssrMatch) charImgRaw = ssrMatch[1];
            else {
                const thumbMatch = html.match(/class="card-info-thumb"[^>]*>[\s\S]*?<img[^>]*src="([^"]+)"/i);
                if (thumbMatch && !thumbMatch[1].includes('lr-spin-dial') && !thumbMatch[1].includes('lightning')) {
                    charImgRaw = thumbMatch[1];
                }
            }

            const rarityType = (html.includes('id="img-lr"') || html.includes('rarity_LR') || html.includes('lr-spin-dial')) ? 'lr' : 'tur';

            const typeMatch = html.match(/class="typing-icon"[^>]*src="([^"]+)"/i) || html.match(/class="card-icon-item-type"[^>]*img[^>]*src="([^"]+)"/i);
            let typingStr = 'agl', classStr = 'super';
            if (typeMatch) {
                const tLow = typeMatch[1].toLowerCase();
                if (tLow.includes('teq')) typingStr = 'teq';
                if (tLow.includes('int')) typingStr = 'int';
                if (tLow.includes('str')) typingStr = 'str';
                if (tLow.includes('phy')) typingStr = 'phy';
                if (tLow.includes('extreme')) classStr = 'extreme';
            }

            const frameMatch = html.match(/class="card-frame"[^>]*src="([^"]+)"/i) || html.match(/<img[^>]*src="([^"]*frame_[^"]+)"/i);
            const frameImg = frameMatch ? frameMatch[1] : `images/frame_${typingStr}.png`;

            const rarityMatch = html.match(/id="main-rarity-icon"[^>]*src="([^"]+)"/i);
            const rarityImg = rarityMatch ? rarityMatch[1] : (rarityType === 'lr' ? 'images/rarity_LR.png' : 'images/rarity_TUR.png');

            const fixUrl = (url) => {
                if (!url) return "";
                if (url.startsWith('http') || url.startsWith('data:')) return url;
                return `${sourceUrl}/${folder}/${url.replace(/^[\.\/]+/, '')}`;
            };

            characters.push({
                folder, title, cardTag, rarityType, typingStr, classStr,
                charImg: fixUrl(charImgRaw),
                frameImg: fixUrl(frameImg),
                rarityImg: fixUrl(rarityImg),
                typeImg: fixUrl(typeMatch ? typeMatch[1] : `images/type_${typingStr}.png`),
                dialImg: fixUrl("images/lr_spin_dial.png"),
                lightningVid: fixUrl("images/lightningfx.webm")
            });
            console.log(`Extracted: ${title} (Tag: ${cardTag})`);
          });

          const tW = { 'agl': 1, 'teq': 2, 'int': 3, 'str': 4, 'phy': 5 };
          const cW = { 'super': 1, 'extreme': 2 };
          const rW = { 'lr': 1, 'tur': 2, 'ssr': 3 };
          
          characters.sort((a, b) => {
              if (tW[a.typingStr] !== tW[b.typingStr]) return tW[a.typingStr] - tW[b.typingStr];
              if (cW[a.classStr] !== cW[b.classStr]) return cW[a.classStr] - cW[b.classStr];
              return rW[a.rarityType] - rW[b.rarityType];
          });

          let cardsHtml = '';
          characters.forEach(char => {
              let lrEffects = (char.rarityType === 'lr') ? `
                  <img class="lr-dial" src="${char.dialImg}">
                  <video class="lr-lightning" autoplay muted loop playsinline><source src="${char.lightningVid}" type="video/webm"></video>` : '';
              
              // THIS WAS THE MISSING PART: data-tag="\${char.cardTag}"
              cardsHtml += `
      <a href="${sourceUrl}/${char.folder}/" target="_blank" class="char-box" data-tag="${char.cardTag}">
          <div class="card-icon">
              <img class="frame" src="${char.frameImg}">
              ${lrEffects}
              <img class="char-img" src="${char.charImg}">
              <img class="rarity" src="${char.rarityImg}">
              <img class="type" src="${char.typeImg}">
          </div>
          <div class="name-container"><div class="char-name">${char.title}</div></div>
      </a>`;
          });

          const hubHtml = `<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <title>Custom Dokkan Box</title>
          <style>
          body { background: linear-gradient(180deg, #18181b 0%, #27272a 100%); color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; min-height: 100vh; margin: 0; }
          h1 { font-size: 3rem; color: #facc15; text-shadow: 0 0 15px rgba(250, 204, 21, 0.4); margin-bottom: 10px; text-transform: uppercase; font-weight: 900; }
          .controls { margin-bottom: 30px; }
          select { background: #1e293b; color: #fff; padding: 10px 20px; border: 2px solid #3b82f6; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
          select:focus { border-color: #facc15; box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }
          .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; background: rgba(0,0,0,0.5); padding: 30px; border-radius: 12px; }
          .char-box { text-decoration: none; color: #f8fafc; display: flex; flex-direction: column; align-items: center; transition: 0.2s; }
          .char-box:hover { transform: scale(1.05); z-index: 10; }
          .card-icon { position: relative; width: 150px; height: 150px; margin-bottom: 10px; }
          .card-icon img, .card-icon video { position: absolute; pointer-events: none; }
          .frame { width: 150px; height: 150px; z-index: 1; top: 0; left: 0; }
          .char-img { height: 188px; z-index: 2; bottom: -13px; left: 50%; transform: translateX(-50%); }
          .lr-dial { width: 140px; height: 140px; z-index: 1; top: 5px; left: 5px; animation: spin 6s linear infinite; }
          .lr-lightning { z-index: 2; width: 290px; top: 50%; left: 50%; transform: translate(-50%, -50%); filter: brightness(10) contrast(1.2); mix-blend-mode: screen; }
          .rarity { height: 75px; z-index: 3; bottom: -16px; left: -10px; filter: drop-shadow(0 2px 2px #000); }
          .type { height: 55px; z-index: 3; top: -8px; right: -8px; }
          .name-container { width: 150px; overflow: hidden; background: rgba(0,0,0,0.8); border: 1px solid #555; border-radius: 6px; padding: 6px 0; }
          .char-name { font-size: 14px; font-weight: 700; white-space: nowrap; display: inline-block; padding: 0 10px; }
          .char-name.scrolling { animation: scroll-text 8s linear infinite; }
          @keyframes scroll-text { 0% { transform: translateX(20%); } 100% { transform: translateX(-100%); } }
          @keyframes spin { 100% { transform: rotate(360deg); } }
          </style>
          </head>
          <body>
              <h1>Character Box</h1>
              <div class="controls">
                  <select id="formFilter" onchange="filterCards()">
                      <option value="all" selected>Show All Characters</option>
                      <option value="a">Main Forms (A)</option>
                      <option value="b">Transformations (B)</option>
                      <option value="c">Transformations (C)</option>
                  </select>
              </div>
              <div class="grid" id="cardGrid">${cardsHtml}</div>
              <script>
                  function filterCards() {
                      const filterValue = document.getElementById('formFilter').value;
                      const cards = document.querySelectorAll('.char-box');
                      
                      cards.forEach(card => {
                          const tag = card.getAttribute('data-tag') || 'a';
                          if (filterValue === 'all' || tag === filterValue) {
                              card.style.display = 'flex';
                          } else {
                              card.style.display = 'none';
                          }
                      });
                  }

                  window.addEventListener('DOMContentLoaded', () => {
                      filterCards(); // Run filter immediately
                      document.querySelectorAll('.char-name').forEach(el => {
                          if(el.scrollWidth > el.parentElement.clientWidth) {
                              el.classList.add('scrolling');
                              el.style.display = 'inline-block';
                          }
                      });
                  });
              <\/script>
          </body>
          </html>`;

          async function uploadToTarget() {
              console.log("Uploading to Target Repo...");
              let existingSha = null;
              try {
                  const getRes = await fetch(`https://api.github.com/repos/${targetRepo}/contents/index.html`, { 
                      headers: { 'Authorization': `token ${token}` } 
                  });
                  if (getRes.ok) existingSha = (await getRes.json()).sha;
              } catch (e) {}

              const base64Content = Buffer.from(hubHtml).toString('base64');
              
              const res = await fetch(`https://api.github.com/repos/${targetRepo}/contents/index.html`, {
                  method: 'PUT',
                  headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ message: "Auto-Update Hub via GitHub Actions", content: base64Content, sha: existingSha })
              });

              if (res.ok) console.log("SUCCESS! Hub Updated.");
              else console.error("Upload failed:", await res.text());
          }

          uploadToTarget();
          EOF
          node build.js
